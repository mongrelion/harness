name: Build and Push

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest version
        id: version
        run: |
          VERSION=$(curl -fsSL https://registry.npmjs.org/@oh-my-pi/pi-coding-agent/latest | jq -r .version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists
        id: check
        run: |
          if docker manifest inspect mongrelion/oh-my-pi:${{ steps.version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image mongrelion/oh-my-pi:${{ steps.version.outputs.version }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image mongrelion/oh-my-pi:${{ steps.version.outputs.version }} not found, will build."
          fi

      - name: Login to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mongrelion/oh-my-pi:latest
            mongrelion/oh-my-pi:${{ steps.version.outputs.version }}
          build-args: VERSION=${{ steps.version.outputs.version }}
